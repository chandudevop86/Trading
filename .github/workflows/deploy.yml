name: Deploy Vinayak

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/vinayak/requirements.txt pytest

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/vinayak -q

      - name: Verify FastAPI entrypoint imports
        run: |
          python -m py_compile app/main.py app/vinayak/api/main.py

      - name: Build production image
        run: |
          docker build -t vinayak:${{ github.sha }} .

      - name: Configure SSH key
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "cd /opt/trading && bash infra/ec2/deploy.sh"
