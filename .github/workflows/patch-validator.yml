name: Patch Validator

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r app/vinayak/requirements.txt
      - name: Generate patch
        run: |
          git diff --no-ext-diff origin/${{ github.base_ref }}...HEAD > patch.diff
      - name: Run patch validator
        run: |
          python -m patch_validator --repo-root . --diff-path patch.diff --format json --output patch-validator-report.json
          python -m patch_validator --repo-root . --diff-path patch.diff --format markdown --output patch-validator-report.md
      - name: Upload patch validator reports
        uses: actions/upload-artifact@v4
        with:
          name: patch-validator-report
          path: |
            patch-validator-report.json
            patch-validator-report.md
