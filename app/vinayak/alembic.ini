[alembic]
script_location = vinayak/db/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///app/vinayak/data/vinayak.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s

from sqlalchemy import text
from vinayak.db.session import initialize_database, build_session_factory
from vinayak.db.models.user import UserRecord
from vinayak.auth.service import UserAuthService, ADMIN_ROLE

initialize_database()
session = build_session_factory()()
try:
    table_check = session.execute(text(
        "SELECT name FROM sqlite_master WHERE type='table' AND name='users'"
    )).fetchone()
    print("users_table:", bool(table_check))

    username = UserAuthService.admin_username()
    password = UserAuthService.admin_password()

    record = session.query(UserRecord).filter(UserRecord.username == username).one_or_none()
    if record is None:
        record = UserRecord(
            username=username,
            password_hash=UserAuthService.hash_password(password),
            role=ADMIN_ROLE,
            is_active=True,
        )
        session.add(record)
        action = "created"
    else:
        record.password_hash = UserAuthService.hash_password(password)
        record.role = ADMIN_ROLE
        record.is_active = True
        action = "updated"

    session.commit()

    rows = session.execute(text(
        "SELECT id, username, role, is_active FROM users ORDER BY id"
    )).fetchall()
    print("admin_action:", action)
    print("users:", rows)
finally:
    session.close()