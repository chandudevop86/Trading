version: '3.9'

services:
  vinayak-api:
    build: .
    container_name: vinayak-api
    env_file:
      - app/vinayak/.env.example
    ports:
      - '8000:8000'
    volumes:
      - ./app/vinayak/data:/app/app/vinayak/data
      - ./app/vinayak/logs:/app/app/vinayak/logs
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
