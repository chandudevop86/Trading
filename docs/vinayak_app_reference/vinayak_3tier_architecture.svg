<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="webTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe6ff"/>
      <stop offset="100%" stop-color="#8fb8eb"/>
    </linearGradient>
    <linearGradient id="appTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff4c8"/>
      <stop offset="100%" stop-color="#98cf74"/>
    </linearGradient>
    <linearGradient id="dataTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7d2e2"/>
      <stop offset="100%" stop-color="#d889b2"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#27496d" flood-opacity="0.18"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2d6cdf"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#42a845"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c94c8b"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #23364d; }
      .label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #23364d; }
      .text { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #24415f; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #35536f; }
      .boxTitle { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: white; }
      .boxText { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="24" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" class="title">Vinayak 3-Tier Trading Architecture</text>
  <text x="700" y="88" text-anchor="middle" class="small">Current Vinayak structure aligned to Web Tier, App Tier, and Data Tier with AWS-ready integrations</text>

  <rect x="70" y="130" width="1260" height="770" rx="20" fill="#ffffff" stroke="#d7e2ef" stroke-width="2"/>

  <rect x="180" y="190" width="230" height="610" rx="18" fill="url(#webTier)" filter="url(#shadow)"/>
  <rect x="520" y="190" width="330" height="610" rx="18" fill="url(#appTier)" filter="url(#shadow)"/>
  <rect x="960" y="190" width="230" height="610" rx="18" fill="url(#dataTier)" filter="url(#shadow)"/>

  <text x="295" y="232" text-anchor="middle" class="label">WEB TIER</text>
  <text x="685" y="232" text-anchor="middle" class="label">APP TIER</text>
  <text x="1075" y="232" text-anchor="middle" class="label">DATA TIER</text>

  <circle cx="95" cy="500" r="36" fill="#ffffff" stroke="#2d6cdf" stroke-width="3"/>
  <circle cx="95" cy="490" r="10" fill="none" stroke="#2d6cdf" stroke-width="3"/>
  <path d="M75 520c8-12 32-12 40 0" stroke="#2d6cdf" stroke-width="3" stroke-linecap="round"/>
  <text x="95" y="552" text-anchor="middle" class="text">Trader</text>

  <rect x="205" y="460" width="180" height="78" rx="14" fill="#f8a81c" stroke="#e58b00" stroke-width="2"/>
  <text x="295" y="491" text-anchor="middle" class="boxTitle">Vinayak Web</text>
  <text x="295" y="514" text-anchor="middle" class="boxText">/admin, /workspace</text>
  <text x="295" y="536" text-anchor="middle" class="boxText">Nginx or ALB entry</text>

  <rect x="555" y="255" width="260" height="70" rx="14" fill="#5d95e8" stroke="#3f75c9" stroke-width="2"/>
  <text x="685" y="284" text-anchor="middle" class="boxTitle">Dashboard API</text>
  <text x="685" y="307" text-anchor="middle" class="boxText">candles, live-analysis</text>

  <rect x="555" y="350" width="260" height="70" rx="14" fill="#ffb01f" stroke="#d08c12" stroke-width="2"/>
  <text x="685" y="379" text-anchor="middle" class="boxTitle">Strategy Service</text>
  <text x="685" y="402" text-anchor="middle" class="boxText">run_strategy_workflow</text>

  <rect x="555" y="445" width="260" height="70" rx="14" fill="#b0b9b8" stroke="#7f8887" stroke-width="2"/>
  <text x="685" y="474" text-anchor="middle" class="boxTitle">Execution Service</text>
  <text x="685" y="497" text-anchor="middle" class="boxText">paper/live trades</text>

  <rect x="555" y="540" width="260" height="70" rx="14" fill="#d97cb0" stroke="#b85a90" stroke-width="2"/>
  <text x="685" y="569" text-anchor="middle" class="boxTitle">Notification Service</text>
  <text x="685" y="592" text-anchor="middle" class="boxText">Telegram summary</text>

  <rect x="555" y="635" width="260" height="70" rx="14" fill="#7da8f2" stroke="#5b83cf" stroke-width="2"/>
  <text x="685" y="664" text-anchor="middle" class="boxTitle">Market Data Service</text>
  <text x="685" y="687" text-anchor="middle" class="boxText">Yahoo, NSE, Dhan inputs</text>

  <rect x="995" y="300" width="160" height="68" rx="14" fill="#7196d8" stroke="#5578bc" stroke-width="2"/>
  <text x="1075" y="329" text-anchor="middle" class="boxTitle">RDS</text>
  <text x="1075" y="352" text-anchor="middle" class="boxText">signals, trades</text>

  <rect x="995" y="390" width="160" height="68" rx="14" fill="#ffa41b" stroke="#db8500" stroke-width="2"/>
  <text x="1075" y="419" text-anchor="middle" class="boxTitle">Redis</text>
  <text x="1075" y="442" text-anchor="middle" class="boxText">hot cache</text>

  <rect x="995" y="480" width="160" height="68" rx="14" fill="#c9caca" stroke="#999b9b" stroke-width="2"/>
  <text x="1075" y="509" text-anchor="middle" class="boxTitle">S3</text>
  <text x="1075" y="532" text-anchor="middle" class="boxText">reports, exports</text>

  <rect x="995" y="570" width="160" height="68" rx="14" fill="#ffe182" stroke="#d8b846" stroke-width="2"/>
  <text x="1075" y="599" text-anchor="middle" class="label">Secrets</text>
  <text x="1075" y="620" text-anchor="middle" class="small">AWS Secrets Manager</text>

  <path d="M131 500 H205" stroke="#2d6cdf" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M385 499 H555" stroke="#2d6cdf" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <path d="M815 290 H995" stroke="#2d6cdf" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M815 385 H995" stroke="#42a845" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <path d="M815 480 H995" stroke="#c94c8b" stroke-width="4" marker-end="url(#arrowPink)"/>
  <path d="M815 575 H995" stroke="#85b44b" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <path d="M870 670 C920 670, 940 670, 995 670" stroke="#25a6a1" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="1088" y="690" text-anchor="middle" class="small">external APIs</text>

  <rect x="1215" y="255" width="88" height="54" rx="12" fill="#ffffff" stroke="#9bb2cb" stroke-width="2"/>
  <text x="1259" y="287" text-anchor="middle" class="text">Yahoo</text>
  <rect x="1215" y="330" width="88" height="54" rx="12" fill="#ffffff" stroke="#9bb2cb" stroke-width="2"/>
  <text x="1259" y="362" text-anchor="middle" class="text">NSE</text>
  <rect x="1215" y="405" width="88" height="54" rx="12" fill="#ffffff" stroke="#9bb2cb" stroke-width="2"/>
  <text x="1259" y="437" text-anchor="middle" class="text">Dhan</text>
  <rect x="1215" y="480" width="88" height="54" rx="12" fill="#ffffff" stroke="#9bb2cb" stroke-width="2"/>
  <text x="1259" y="512" text-anchor="middle" class="text">Telegram</text>

  <text x="170" y="845" class="text">Current fit to 3-tier logic:</text>
  <text x="170" y="872" class="small">Web tier serves users, app tier runs trading logic and APIs, data tier stores state, cache, and report artifacts.</text>
  <text x="170" y="895" class="small">Remaining production work is deployment verification, managed infra wiring, and environment-level validation.</text>
</svg>
