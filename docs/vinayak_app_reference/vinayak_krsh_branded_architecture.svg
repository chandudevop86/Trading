<svg width="1400" height="980" viewBox="0 0 1400 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f1e8"/>
      <stop offset="100%" stop-color="#fdfbf8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102a43"/>
      <stop offset="100%" stop-color="#1f6f78"/>
    </linearGradient>
    <linearGradient id="webTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ebff"/>
      <stop offset="100%" stop-color="#8eb8d8"/>
    </linearGradient>
    <linearGradient id="appTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff3ea"/>
      <stop offset="100%" stop-color="#7abf9b"/>
    </linearGradient>
    <linearGradient id="dataTier" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde7ce"/>
      <stop offset="100%" stop-color="#d7a86e"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#17324a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2f6ea5"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2c8b7e"/>
    </marker>
    <marker id="arrowGold" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c6862f"/>
    </marker>
    <style>
      .brand { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #fdfbf8; letter-spacing: 3px; }
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #17324a; }
      .subtitle { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #54708a; }
      .label { font: 700 19px 'Segoe UI', Arial, sans-serif; fill: #17324a; }
      .text { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #27455f; }
      .small { font: 500 13px 'Segoe UI', Arial, sans-serif; fill: #54708a; }
      .boxTitle { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: white; }
      .boxText { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: white; }
    </style>
  </defs>

  <rect width="1400" height="980" rx="24" fill="url(#bg)"/>
  <rect x="55" y="42" width="1290" height="110" rx="24" fill="url(#hero)"/>
  <text x="95" y="85" class="brand">KRSH SOLUTIONS</text>
  <text x="95" y="118" style="font:700 34px 'Segoe UI', Arial, sans-serif; fill:#ffffff;">Vinayak Trading Platform</text>
  <text x="95" y="143" style="font:500 15px 'Segoe UI', Arial, sans-serif; fill:#d8ecec;">Branded 3-tier architecture view for presentation, documentation, and deployment planning</text>

  <text x="700" y="200" text-anchor="middle" class="title">Vinayak 3-Tier Trading Architecture</text>
  <text x="700" y="228" text-anchor="middle" class="subtitle">KRSH-branded component communication view mapped to Web Tier, App Tier, and Data Tier</text>

  <rect x="70" y="260" width="1260" height="630" rx="24" fill="#ffffff" stroke="#e4ddd2" stroke-width="2"/>

  <rect x="180" y="320" width="230" height="490" rx="18" fill="url(#webTier)" filter="url(#shadow)"/>
  <rect x="520" y="320" width="330" height="490" rx="18" fill="url(#appTier)" filter="url(#shadow)"/>
  <rect x="960" y="320" width="230" height="490" rx="18" fill="url(#dataTier)" filter="url(#shadow)"/>

  <text x="295" y="362" text-anchor="middle" class="label">WEB TIER</text>
  <text x="685" y="362" text-anchor="middle" class="label">APP TIER</text>
  <text x="1075" y="362" text-anchor="middle" class="label">DATA TIER</text>

  <circle cx="98" cy="560" r="36" fill="#ffffff" stroke="#2f6ea5" stroke-width="3"/>
  <circle cx="98" cy="550" r="10" fill="none" stroke="#2f6ea5" stroke-width="3"/>
  <path d="M78 580c8-12 32-12 40 0" stroke="#2f6ea5" stroke-width="3" stroke-linecap="round"/>
  <text x="98" y="612" text-anchor="middle" class="text">Trader</text>

  <rect x="205" y="520" width="180" height="78" rx="14" fill="#c6862f" stroke="#a86a1d" stroke-width="2"/>
  <text x="295" y="551" text-anchor="middle" class="boxTitle">KRSH Web UI</text>
  <text x="295" y="574" text-anchor="middle" class="boxText">Vinayak admin and workspace</text>

  <rect x="555" y="380" width="260" height="68" rx="14" fill="#2f6ea5" stroke="#255780" stroke-width="2"/>
  <text x="685" y="409" text-anchor="middle" class="boxTitle">Dashboard API</text>
  <text x="685" y="431" text-anchor="middle" class="boxText">candles and live-analysis</text>

  <rect x="555" y="470" width="260" height="68" rx="14" fill="#2c8b7e" stroke="#216d63" stroke-width="2"/>
  <text x="685" y="499" text-anchor="middle" class="boxTitle">Strategy Workspace</text>
  <text x="685" y="521" text-anchor="middle" class="boxText">signals, option metrics, lots</text>

  <rect x="555" y="560" width="260" height="68" rx="14" fill="#9c7a4e" stroke="#7d603d" stroke-width="2"/>
  <text x="685" y="589" text-anchor="middle" class="boxTitle">Execution and Alerts</text>
  <text x="685" y="611" text-anchor="middle" class="boxText">paper or live plus Telegram</text>

  <rect x="555" y="650" width="260" height="68" rx="14" fill="#5e8f6b" stroke="#486f53" stroke-width="2"/>
  <text x="685" y="679" text-anchor="middle" class="boxTitle">Market Data Services</text>
  <text x="685" y="701" text-anchor="middle" class="boxText">Yahoo, NSE, Dhan integrations</text>

  <rect x="995" y="400" width="160" height="64" rx="14" fill="#7c99c5" stroke="#5f7cad" stroke-width="2"/>
  <text x="1075" y="428" text-anchor="middle" class="boxTitle">RDS</text>
  <text x="1075" y="449" text-anchor="middle" class="boxText">trade state</text>

  <rect x="995" y="487" width="160" height="64" rx="14" fill="#cc8d36" stroke="#a46f28" stroke-width="2"/>
  <text x="1075" y="515" text-anchor="middle" class="boxTitle">Redis</text>
  <text x="1075" y="536" text-anchor="middle" class="boxText">hot cache</text>

  <rect x="995" y="574" width="160" height="64" rx="14" fill="#73a08f" stroke="#547a6c" stroke-width="2"/>
  <text x="1075" y="602" text-anchor="middle" class="boxTitle">S3 Reports</text>
  <text x="1075" y="623" text-anchor="middle" class="boxText">json and summary</text>

  <rect x="995" y="661" width="160" height="64" rx="14" fill="#ead9b7" stroke="#c0ab83" stroke-width="2"/>
  <text x="1075" y="689" text-anchor="middle" class="label">Secrets</text>
  <text x="1075" y="709" text-anchor="middle" class="small">AWS Secrets Manager</text>

  <path d="M134 560 H205" stroke="#2f6ea5" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M385 559 H555" stroke="#2f6ea5" stroke-width="4" marker-end="url(#arrowBlue)"/>

  <path d="M815 414 H995" stroke="#2f6ea5" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M815 519 H995" stroke="#c6862f" stroke-width="4" marker-end="url(#arrowGold)"/>
  <path d="M815 594 H995" stroke="#2c8b7e" stroke-width="4" marker-end="url(#arrowTeal)"/>
  <path d="M815 689 H995" stroke="#6f8d59" stroke-width="4" marker-end="url(#arrowTeal)"/>

  <rect x="1212" y="385" width="92" height="52" rx="12" fill="#ffffff" stroke="#c6bcae" stroke-width="2"/>
  <text x="1258" y="417" text-anchor="middle" class="text">Yahoo</text>
  <rect x="1212" y="450" width="92" height="52" rx="12" fill="#ffffff" stroke="#c6bcae" stroke-width="2"/>
  <text x="1258" y="482" text-anchor="middle" class="text">NSE</text>
  <rect x="1212" y="515" width="92" height="52" rx="12" fill="#ffffff" stroke="#c6bcae" stroke-width="2"/>
  <text x="1258" y="547" text-anchor="middle" class="text">Dhan</text>
  <rect x="1212" y="580" width="92" height="52" rx="12" fill="#ffffff" stroke="#c6bcae" stroke-width="2"/>
  <text x="1258" y="612" text-anchor="middle" class="text">Telegram</text>

  <text x="90" y="935" class="small">Brand palette: navy, teal, warm gold. Suitable for project reports, client walkthroughs, and interview decks.</text>
</svg>
