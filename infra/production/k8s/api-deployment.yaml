apiVersion: apps/v1
kind: Deployment
metadata:
  name: vinayak-api
  namespace: vinayak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vinayak-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vinayak-api
    spec:
      containers:
        - name: api
          image: vinayak/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: vinayak-config
            - secretRef:
                name: vinayak-secrets
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
