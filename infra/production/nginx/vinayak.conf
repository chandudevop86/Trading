server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_read_timeout 30s;
    }

    location /health/ready {
        proxy_pass http://127.0.0.1:8000/health/ready;
        proxy_read_timeout 30s;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8000/admin;
        proxy_read_timeout 120s;
    }

    location /login {
        proxy_pass http://127.0.0.1:8000/login;
        proxy_read_timeout 120s;
    }

    location /logout {
        proxy_pass http://127.0.0.1:8000/logout;
        proxy_read_timeout 120s;
    }

    location /workspace {
        proxy_pass http://127.0.0.1:8000/workspace;
        proxy_read_timeout 120s;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8000/dashboard/;
        proxy_read_timeout 120s;
    }

    location /signals/ {
        proxy_pass http://127.0.0.1:8000/signals/;
        proxy_read_timeout 120s;
    }

    location /executions/ {
        proxy_pass http://127.0.0.1:8000/executions/;
        proxy_read_timeout 120s;
    }

    location /reviewed-trades/ {
        proxy_pass http://127.0.0.1:8000/reviewed-trades/;
        proxy_read_timeout 120s;
    }

    location /production/ {
        proxy_pass http://127.0.0.1:8000/production/;
        proxy_read_timeout 120s;
    }

    location /streamlit/ {
        proxy_pass http://127.0.0.1:8501/;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_read_timeout 120s;
    }
}
