apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: intratrade-hpa
  namespace: intratrade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: intratrade-app
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
