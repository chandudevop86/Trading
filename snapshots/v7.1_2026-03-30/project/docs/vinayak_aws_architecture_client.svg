<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eaf2fb"/>
    </linearGradient>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L0,12 L12,6 z" fill="#3b82f6"/>
    </marker>
    <style>
      .title { font: 800 30px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .sub { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #4c6783; }
      .box { fill: white; stroke: #b8cee6; stroke-width: 2; rx: 24; }
      .head { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .txt { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #4c6783; }
      .tier { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #c47a00; }
    </style>
  </defs>
  <rect width="1400" height="820" fill="url(#bg2)"/>
  <text x="60" y="64" class="title">Vinayak Client-Facing AWS Architecture</text>
  <text x="60" y="94" class="sub">Simple view of how the trading platform is delivered, processed, and stored in AWS</text>

  <text x="90" y="156" class="tier">WEB TIER</text>
  <rect x="70" y="180" width="1260" height="120" rx="28" fill="#eef6ff" stroke="#c7daee"/>
  <rect x="120" y="210" width="230" height="62" rx="18" fill="#ffffff" stroke="#b8cee6"/>
  <text x="235" y="247" text-anchor="middle" class="head">Users</text>
  <rect x="465" y="210" width="230" height="62" rx="18" fill="#ffffff" stroke="#b8cee6"/>
  <text x="580" y="247" text-anchor="middle" class="head">Route 53</text>
  <rect x="810" y="210" width="230" height="62" rx="18" fill="#ffffff" stroke="#b8cee6"/>
  <text x="925" y="247" text-anchor="middle" class="head">ALB + HTTPS</text>
  <rect x="1090" y="210" width="180" height="62" rx="18" fill="#ffffff" stroke="#b8cee6"/>
  <text x="1180" y="247" text-anchor="middle" class="head">Vinayak UI</text>

  <text x="90" y="376" class="tier">APP TIER</text>
  <rect x="70" y="400" width="1260" height="150" rx="28" fill="#eef9f2" stroke="#c9e7d1"/>
  <rect x="150" y="436" width="500" height="78" rx="18" fill="#ffffff" stroke="#b8d9c1"/>
  <text x="400" y="470" text-anchor="middle" class="head">ECS Fargate: Vinayak App</text>
  <text x="400" y="494" text-anchor="middle" class="txt">Admin, workspace, API, live analysis, execution, alerts</text>
  <rect x="770" y="436" width="210" height="78" rx="18" fill="#ffffff" stroke="#b8d9c1"/>
  <text x="875" y="470" text-anchor="middle" class="head">Secrets</text>
  <text x="875" y="494" text-anchor="middle" class="txt">Dhan, Telegram, DB</text>
  <rect x="1040" y="436" width="210" height="78" rx="18" fill="#ffffff" stroke="#b8d9c1"/>
  <text x="1145" y="470" text-anchor="middle" class="head">Monitoring</text>
  <text x="1145" y="494" text-anchor="middle" class="txt">CloudWatch logs and alarms</text>

  <text x="90" y="626" class="tier">DATA TIER</text>
  <rect x="70" y="650" width="1260" height="120" rx="28" fill="#fff4f7" stroke="#ead1dc"/>
  <rect x="140" y="680" width="280" height="60" rx="18" fill="#ffffff" stroke="#e4c4d5"/>
  <text x="280" y="716" text-anchor="middle" class="head">RDS PostgreSQL</text>
  <rect x="560" y="680" width="280" height="60" rx="18" fill="#ffffff" stroke="#e4c4d5"/>
  <text x="700" y="716" text-anchor="middle" class="head">ElastiCache Redis</text>
  <rect x="980" y="680" width="240" height="60" rx="18" fill="#ffffff" stroke="#e4c4d5"/>
  <text x="1100" y="716" text-anchor="middle" class="head">S3 Reports</text>

  <line x1="350" y1="241" x2="465" y2="241" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="695" y1="241" x2="810" y2="241" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="1040" y1="241" x2="1090" y2="241" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="925" y1="272" x2="470" y2="436" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="470" y1="514" x2="280" y2="680" stroke="#ec9b2d" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="540" y1="514" x2="700" y2="680" stroke="#ec9b2d" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="610" y1="514" x2="1100" y2="680" stroke="#ec9b2d" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="650" y1="460" x2="770" y2="460" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>
  <line x1="650" y1="490" x2="1040" y2="490" stroke="#3b82f6" stroke-width="4" marker-end="url(#arrow2)"/>

  <text x="60" y="796" class="sub">Connection summary: Users access the platform through Route 53 and ALB, the Vinayak app runs on ECS Fargate, core state is stored in RDS, fast cache is handled by Redis, and reports or exports are stored in S3.</text>
</svg>
