version: "3.9"

services:
  vinayak-api:
    build:
      context: ../..
      dockerfile: infra/app/docker/Dockerfile
    container_name: vinayak-api-uat
    env_file:
      - ../env/uat.env.example
    environment:
      APP_ENV: uat
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      VINAYAK_DATABASE_URL: postgresql+psycopg2://vinayak:vinayak@vinayak-postgres-uat:5432/vinayak
      REDIS_URL: redis://vinayak-redis-uat:6379/0
      MESSAGE_BUS_ENABLED: "true"
      MESSAGE_BUS_BACKEND: rabbitmq
      MESSAGE_BUS_URL: amqp://guest:guest@vinayak-rabbitmq-uat:5672/
      MESSAGE_BUS_TOPIC_PREFIX: vinayak.uat
    ports:
      - "8000:8000"
    depends_on:
      - vinayak-postgres-uat
      - vinayak-redis-uat
      - vinayak-rabbitmq-uat
    volumes:
      - ../../app/vinayak/data:/app/app/vinayak/data
      - ../../data:/app/data
    restart: unless-stopped

  vinayak-outbox-worker:
    build:
      context: ../..
      dockerfile: infra/app/docker/Dockerfile
    container_name: vinayak-outbox-worker-uat
    env_file:
      - ../env/uat.env.example
    environment:
      APP_ENV: uat
      VINAYAK_DATABASE_URL: postgresql+psycopg2://vinayak:vinayak@vinayak-postgres-uat:5432/vinayak
      REDIS_URL: redis://vinayak-redis-uat:6379/0
      MESSAGE_BUS_ENABLED: "true"
      MESSAGE_BUS_BACKEND: rabbitmq
      MESSAGE_BUS_URL: amqp://guest:guest@vinayak-rabbitmq-uat:5672/
      MESSAGE_BUS_TOPIC_PREFIX: vinayak.uat
    command: ["python", "-m", "vinayak.workers.outbox_worker"]
    depends_on:
      - vinayak-postgres-uat
      - vinayak-rabbitmq-uat
    restart: unless-stopped

  vinayak-queue-worker:
    build:
      context: ../..
      dockerfile: infra/app/docker/Dockerfile
    container_name: vinayak-queue-worker-uat
    env_file:
      - ../env/uat.env.example
    environment:
      APP_ENV: uat
      VINAYAK_DATABASE_URL: postgresql+psycopg2://vinayak:vinayak@vinayak-postgres-uat:5432/vinayak
      REDIS_URL: redis://vinayak-redis-uat:6379/0
      MESSAGE_BUS_ENABLED: "true"
      MESSAGE_BUS_BACKEND: rabbitmq
      MESSAGE_BUS_URL: amqp://guest:guest@vinayak-rabbitmq-uat:5672/
      MESSAGE_BUS_TOPIC_PREFIX: vinayak.uat
    command: ["python", "-m", "vinayak.workers.event_worker"]
    depends_on:
      - vinayak-rabbitmq-uat
    restart: unless-stopped

  vinayak-postgres-uat:
    image: postgres:16-alpine
    container_name: vinayak-postgres-uat
    environment:
      POSTGRES_DB: vinayak
      POSTGRES_USER: vinayak
      POSTGRES_PASSWORD: vinayak
    ports:
      - "5433:5432"
    volumes:
      - vinayak_postgres_uat_data:/var/lib/postgresql/data
    restart: unless-stopped

  vinayak-redis-uat:
    image: redis:7-alpine
    container_name: vinayak-redis-uat
    ports:
      - "6380:6379"
    restart: unless-stopped

  vinayak-rabbitmq-uat:
    image: rabbitmq:3-management-alpine
    container_name: vinayak-rabbitmq-uat
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - vinayak_rabbitmq_uat_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  vinayak_postgres_uat_data:
  vinayak_rabbitmq_uat_data:

