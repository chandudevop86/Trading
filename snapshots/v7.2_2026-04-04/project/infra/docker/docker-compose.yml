version: "3.9"

services:
  intratrade:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    image: intratrade:latest
    container_name: intratrade_app
    ports:
      - "8501:8501"
    environment:
      APP_ENV: "local"
      LEGACY_DEPLOYMENT_TARGET: "local"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      AWS_DEFAULT_REGION: "ap-south-1"
    volumes:
      - ../../data:/app/data
    restart: unless-stopped

