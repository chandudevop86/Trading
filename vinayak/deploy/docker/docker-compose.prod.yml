version: "3.9"

services:
  vinayak-api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: vinayak-api-prod
    env_file:
      - ../env/prod.env.example
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - vinayak-postgres
      - vinayak-redis
      - vinayak-rabbitmq
    volumes:
      - ../../vinayak/data:/app/vinayak/data
    restart: unless-stopped

  vinayak-outbox-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: vinayak-outbox-worker-prod
    env_file:
      - ../env/prod.env.example
    environment:
      APP_ENV: production
    command: ["python", "-m", "vinayak.workers.outbox_worker"]
    depends_on:
      - vinayak-postgres
      - vinayak-rabbitmq
    restart: unless-stopped

  vinayak-queue-worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: vinayak-queue-worker-prod
    env_file:
      - ../env/prod.env.example
    environment:
      APP_ENV: production
    command: ["python", "-m", "vinayak.workers.event_worker"]
    depends_on:
      - vinayak-rabbitmq
    restart: unless-stopped

  vinayak-postgres:
    image: postgres:16-alpine
    container_name: vinayak-postgres-prod
    environment:
      POSTGRES_DB: vinayak
      POSTGRES_USER: vinayak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - vinayak_postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped

  vinayak-redis:
    image: redis:7-alpine
    container_name: vinayak-redis-prod
    restart: unless-stopped

  vinayak-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vinayak-rabbitmq-prod
    environment:
      RABBITMQ_DEFAULT_USER: vinayak
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
    volumes:
      - vinayak_rabbitmq_prod_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  vinayak_postgres_prod_data:
  vinayak_rabbitmq_prod_data:
