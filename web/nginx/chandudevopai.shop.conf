# Archived reference: this legacy Streamlit vhost is not the supported Vinayak operator ingress. Use infra/production/nginx/vinayak.conf for the FastAPI runtime.
# Nginx vhost for Intratrade Streamlit app
# Domain: chandudevopai.shop
# Upstream app: streamlit on 127.0.0.1:8501

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name chandudevopai.shop www.chandudevopai.shop;

    location / {
        return 301 https://chandudevopai.shop$request_uri;
    }
}

# HTTPS app server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chandudevopai.shop;

    # Update these certificate paths after issuing certs via certbot
    ssl_certificate /etc/letsencrypt/live/chandudevopai.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chandudevopai.shop/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Streamlit/websocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

# Optional: canonical redirect from www to apex over HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chandudevopai.shop;

    ssl_certificate /etc/letsencrypt/live/chandudevopai.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chandudevopai.shop/privkey.pem;

    return 301 https://chandudevopai.shop$request_uri;
}
